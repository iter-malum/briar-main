services:
  postgres:
    image: postgres:15-alpine
    container_name: briar-postgres
    environment:
      POSTGRES_USER: briar
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: briar_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U briar -d briar_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - briar-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: briar-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - briar-net

  redis:
    image: redis:7-alpine
    container_name: briar-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - briar-net

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: briar-orchestrator
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      AUTH_SERVICE_URL: http://auth-service:8000
    ports:
      - "8001:8000"
    networks:
      - briar-net

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: briar-gateway
    depends_on:
      orchestrator: { condition: service_started }
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      AUTH_SERVICE_URL: http://auth-service:8000
      INTEGRATION_SERVICE_URL: http://integration-service:8000
      JWT_SECRET: super_secret_key_for_development_only
      JWT_ALGORITHM: HS256
    ports:
      - "8000:8000"
    networks:
      - briar-net

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: briar-auth-service
    depends_on:
      redis: { condition: service_healthy }
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PLAYWRIGHT_TIMEOUT: "30000"
    ports:
      - "8002:8000"
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - briar-net

  # === SCANNER WORKERS ===

  worker-whatweb:
    build:
      context: .
      dockerfile: services/worker-whatweb/Dockerfile
    container_name: briar-worker-whatweb
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres:  { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      AUTH_SERVICE_URL: http://auth-service:8000
      WHATWEB_TIMEOUT: "120"
      WHATWEB_AGGRESSION: "3"
    networks:
      - briar-net
    restart: unless-stopped

  worker-katana:
    build:
      context: .
      dockerfile: services/worker-katana/Dockerfile
    container_name: briar-worker-katana
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      AUTH_SERVICE_URL: http://auth-service:8000
      KATANA_TIMEOUT: "600"
      KATANA_DEPTH: "3"
      KATANA_CONCURRENCY: "10"
    networks:
      - briar-net
    restart: unless-stopped

  worker-nuclei:
    build:
      context: .
      dockerfile: services/worker-nuclei/Dockerfile
    container_name: briar-worker-nuclei
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      AUTH_SERVICE_URL: http://auth-service:8000
      NUCLEI_TIMEOUT: "1800"
      NUCLEI_RATE_LIMIT: "100"
      NUCLEI_CONCURRENCY: "25"
    networks:
      - briar-net
    restart: unless-stopped

  worker-ffuf:
    build:
      context: .
      dockerfile: services/worker-ffuf/Dockerfile
    container_name: briar-worker-ffuf
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      AUTH_SERVICE_URL: http://auth-service:8000
      FFUF_TIMEOUT: "1200"
      FFUF_RATE: "1000"
      FFUF_THREADS: "40"
      FFUF_WORDLIST: "/usr/share/seclists/Discovery/Web-Content/common.txt"
    networks:
      - briar-net
    restart: unless-stopped

  worker-zap:
    build:
      context: .
      dockerfile: services/worker-zap/Dockerfile
    container_name: briar-worker-zap
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      AUTH_SERVICE_URL: http://auth-service:8000
      ZAP_TIMEOUT: "3600"
      ZAP_PORT: "8090"
      ZAP_API_KEY: "briar-zap-api-key-2024"
      ZAP_MAX_DURATION: "30"
    networks:
      - briar-net
    restart: unless-stopped

  worker-httpx:
    build:
      context: .
      dockerfile: services/worker-httpx/Dockerfile
    container_name: briar-worker-httpx
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      AUTH_SERVICE_URL: http://auth-service:8000
      HTTPX_TIMEOUT: "600"
      HTTPX_THREADS: "50"
      HTTPX_RATE_LIMIT: "200"
    networks:
      - briar-net
    restart: unless-stopped

  worker-sqlmap:
    build:
      context: .
      dockerfile: services/worker-sqlmap/Dockerfile
    container_name: briar-worker-sqlmap
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      AUTH_SERVICE_URL: http://auth-service:8000
      SQLMAP_BIN: /opt/sqlmap/sqlmap.py
      SQLMAP_LEVEL: "1"
      SQLMAP_RISK: "1"
      SQLMAP_DUMP: "false"
      SQLMAP_PER_URL_TIMEOUT: "600"
      SQLMAP_TOTAL_TIMEOUT: "1800"
    networks:
      - briar-net
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: briar-neo4j
    environment:
      NEO4J_AUTH: neo4j/briar_neo4j_password
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - briar-net

  ui-service:
    build:
      context: .
      dockerfile: services/ui-service/Dockerfile
    container_name: briar-ui-service
    depends_on:
      postgres: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: briar_neo4j_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    ports:
      - "8003:8000"
    networks:
      - briar-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: briar-frontend
    depends_on:
      - ui-service
      - gateway
    environment:
      VITE_GATEWAY_URL: http://localhost:8000
      VITE_UI_API_URL: http://localhost:8003
    ports:
      - "3000:3000"
    networks:
      - briar-net

  # === INTEGRATIONS & MONITORING ===

  integration-service:
    build:
      context: .
      dockerfile: services/integration-service/Dockerfile
    container_name: briar-integration-service
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB_USER: briar
      DB_PASSWORD: secure_password_change_me
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: briar_db
      ORCHESTRATOR_URL: http://orchestrator:8000
      GITLAB_WEBHOOK_TOKEN: "change_me_gitlab_token"
      DEFAULT_SCAN_TOOLS: "whatweb,katana,httpx,ffuf,nuclei,zap"
    ports:
      - "8004:8000"
    networks:
      - briar-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: briar-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - briar-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: briar-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: briar_grafana_2024
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/briar-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - briar-net
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  neo4j_data:
  prometheus_data:
  grafana_data:

networks:
  briar-net:
    driver: bridge